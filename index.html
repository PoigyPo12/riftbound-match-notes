<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>RB Match Buddy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; -webkit-tap-highlight-color: transparent; overflow-y: auto; padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
        .theme-p1 { background-color: rgba(13, 148, 136, 0.1); border-color: rgba(13, 148, 136, 0.3); }
        .theme-p2 { background-color: rgba(225, 29, 72, 0.1); border-color: rgba(225, 29, 72, 0.3); }
        .active-turn-p1 { border-color: rgba(20, 184, 166, 0.8); box-shadow: 0 0 20px rgba(20, 184, 166, 0.15) inset; }
        .active-turn-p2 { border-color: rgba(244, 63, 94, 0.8); box-shadow: 0 0 20px rgba(244, 63, 94, 0.15) inset; }
        .stat-card { background-color: rgba(30, 41, 59, 0.8); border-radius: 0.75rem; padding: 0.75rem 0.5rem; display: flex; flex-direction: column; align-items: center; border: 1px solid rgba(255,255,255,0.05); }
        .btn-stat { width: 2.6rem; height: 2.6rem; display: flex; align-items: center; justify-content: center; background-color: #334155; border-radius: 0.6rem; font-size: 1.2rem; font-weight: bold; color: white; transition: all 0.1s; touch-action: manipulation; }
        .btn-stat:active { background-color: #475569; transform: scale(0.9); }
        .flag-active { animation: pulse-red 2s infinite; background-color: #b91c1c !important; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.6); } 70% { box-shadow: 0 0 0 12px rgba(220, 38, 38, 0); } 100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); } }
        .play-area { display: flex; flex-direction: column; gap: 1rem; padding: 1rem; }
        @media (min-width: 768px), (orientation: landscape) { .play-area { flex-direction: row; } .player-board { flex: 1; } }
        .modal-overlay { background-color: rgba(0,0,0,0.85); backdrop-filter: blur(4px); }
        .edit-input { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(20, 184, 166, 0.5); border-radius: 4px; padding: 2px 8px; color: white; outline: none; width: 120px; }
    </style>
</head>
<body>
    <div id="setup-screen" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl max-w-md w-full border border-slate-700">
            <h1 class="text-3xl font-bold text-center mb-8 text-teal-400">RB Match Buddy</h1>
            <div class="space-y-6">
                <div><label class="block text-xs font-semibold text-slate-400 uppercase mb-2">Judge Name</label><input type="text" id="setup-user-name" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-white outline-none" placeholder="e.g. John"></div>
                <div class="space-y-3">
                    <h2 class="text-sm font-bold text-slate-300 uppercase">New Match</h2>
                    <input type="text" id="setup-p1-name" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-white" value="Player 1">
                    <input type="text" id="setup-p2-name" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-white" value="Player 2">
                    <button id="btn-create-room" class="w-full bg-teal-600 hover:bg-teal-500 text-white font-bold py-3 rounded-lg shadow-lg active:scale-95 transition">Create Room (Admin)</button>
                </div>
                <div class="relative py-4"><div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-700"></div></div><div class="relative flex justify-center text-xs uppercase"><span class="bg-slate-800 px-2 text-slate-500">Or</span></div></div>
                <div class="space-y-3"><input type="text" id="setup-room-code" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-white uppercase text-center tracking-widest font-mono" placeholder="CODE"><button id="btn-join-room" class="w-full bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 rounded-lg active:scale-95 transition">Join (Viewer)</button></div>
            </div>
        </div>
    </div>

    <div id="app-screen" class="hidden min-h-screen flex flex-col">
        <header class="h-16 bg-slate-800/80 sticky top-0 z-40 border-b border-slate-700 flex justify-between items-center px-4 shrink-0 backdrop-blur-sm">
            <div class="flex flex-col"><span class="text-[10px] uppercase text-slate-500 font-bold">Room</span><span id="ui-room-code" class="font-mono font-bold text-teal-400 text-lg">----</span></div>
            <div class="flex gap-2">
                <button id="btn-flag" class="bg-slate-700 w-11 h-11 rounded-xl flex items-center justify-center transition"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 21v-4m0 0V5a2 2 0 012-2h6.5l1 1H21l-3 6 3 6h-8.5l-1-1H5a2 2 0 00-2 2zm9-13.5V9" /></svg></button>
                <button id="btn-undo" class="bg-slate-700 w-11 h-11 rounded-xl flex items-center justify-center admin-only transition"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6" /></svg></button>
                <button id="btn-log" class="bg-slate-700 w-11 h-11 rounded-xl flex items-center justify-center transition"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg></button>
                <button id="btn-settings" class="bg-slate-700 w-11 h-11 rounded-xl flex items-center justify-center transition"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><circle cx="12" cy="12" r="3" stroke-width="2" /></svg></button>
            </div>
        </header>
        <main class="play-area flex-grow" id="play-area"></main>
        <footer class="h-8 bg-slate-900 sticky bottom-0 z-40 text-[10px] text-slate-500 flex items-center px-4 shrink-0 border-t border-slate-800" id="ui-last-log">Ready</footer>
    </div>

    <div id="modal-log" class="modal-overlay fixed inset-0 z-50 hidden flex items-center justify-center p-4"><div class="bg-slate-800 rounded-2xl w-full max-w-lg h-[80vh] flex flex-col border border-slate-700 shadow-2xl"><div class="p-4 border-b border-slate-700 flex justify-between items-center"><h3 class="font-bold">Match History</h3><button class="close-modal">✕</button></div><div id="log-container" class="p-4 overflow-y-auto flex-1 font-mono text-xs space-y-2"></div><div class="p-4 border-t border-slate-700"><button id="btn-export" class="w-full bg-slate-700 py-3 rounded-xl font-bold">Copy Report</button></div></div></div>
    <div id="modal-settings" class="modal-overlay fixed inset-0 z-50 hidden flex items-center justify-center p-4"><div class="bg-slate-800 rounded-2xl w-full max-w-sm border border-slate-700 shadow-2xl overflow-hidden"><div class="p-4 border-b border-slate-700 flex justify-between items-center"><h3 class="font-bold">Options</h3><button class="close-modal">✕</button></div><div class="p-6 space-y-6"><div class="flex items-center justify-between"><span class="text-sm">Haptic Feedback</span><input type="checkbox" id="toggle-haptic" class="w-6 h-6 accent-teal-500" checked></div><button id="btn-reset-match" class="w-full bg-red-900/50 border border-red-800 text-red-200 py-4 rounded-xl font-bold admin-only">Reset for New Game</button></div></div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAoSrB369YkJRGvN5ppvfMrWPyc4A_TQp8",
            authDomain: "riftbound-match-notes.firebaseapp.com",
            projectId: "riftbound-match-notes",
            storageBucket: "riftbound-match-notes.firebasestorage.app",
            messagingSenderId: "572843702141",
            appId: "1:572843702141:web:7e82385fc04c6678aebe14"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let userRole = 'viewer'; let currentRoom = null; let judgeName = 'Judge'; let undoStack = []; let editingPlayer = null;
        const defaultState = { p1: { name: "Player 1", points: 0, xp: 0, hand: 4, runes: 0, energy: 0, power: 0, active: false, turnCount: 0 }, p2: { name: "Player 2", points: 0, xp: 0, hand: 4, runes: 0, energy: 0, power: 0, active: false, turnCount: 0 }, flag: false, logs: [] };
        let state = JSON.parse(JSON.stringify(defaultState));
        const stats = [{ id: 'points', label: 'Points' }, { id: 'xp', label: 'XP' }, { id: 'runes', label: '🌀 Runes' }, { id: 'hand', label: '🖐🏻 Hand' }, { id: 'energy', label: 'Energy' }, { id: 'power', label: 'Power' }];

        const sync = async () => { if (userRole !== 'admin' || !currentRoom) return; try { await setDoc(doc(db, 'matches', currentRoom), state); } catch (e) { console.error(e); } };
        const addLog = (msg) => { const time = new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' }); state.logs.unshift(`${time} - ${msg}`); if (state.logs.length > 60) state.logs.pop(); };
        const saveUndo = () => { undoStack.push(JSON.stringify(state)); if (undoStack.length > 20) undoStack.shift(); };

        const render = () => {
            const container = document.getElementById('play-area');
            if (container.children.length === 0) {
                container.innerHTML = ['p1', 'p2'].map(p => `
                    <div id="board-${p}" class="player-board theme-${p} border-2 rounded-2xl p-4 flex flex-col transition-all shadow-lg">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <div id="name-container-${p}" class="flex items-center gap-2"><h2 class="font-bold text-lg" id="name-text-${p}"></h2><button onclick="startEditName('${p}')" class="admin-only opacity-40 p-1">✎</button></div>
                                <div id="name-edit-${p}" class="hidden flex items-center gap-1"><input type="text" id="input-name-${p}" class="edit-input text-sm"><button onclick="saveName('${p}')" class="text-teal-400">✓</button></div>
                                <span class="text-[10px] text-slate-500 font-black uppercase" id="turn-count-${p}"></span>
                            </div>
                            <button id="next-${p}" class="admin-only bg-slate-800 px-3 py-1.5 rounded-lg text-[10px] font-black border border-slate-600">NEXT TURN</button>
                        </div>
                        <div class="grid grid-cols-2 gap-3 flex-1">
                            ${stats.map(s => `
                                <div class="stat-card">
                                    <span class="text-[10px] uppercase font-bold mb-2 text-slate-400">${s.label}</span>
                                    <div class="flex items-center justify-center gap-4 w-full px-2">
                                        <button class="btn-stat admin-only" onclick="updateStat('${p}','${s.id}',-1)">-</button>
                                        <span class="text-2xl font-black font-mono text-center w-12" id="val-${p}-${s.id}">0</span>
                                        <button class="btn-stat admin-only" onclick="updateStat('${p}','${s.id}',1)">+</button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>`).join('');
                ['p1', 'p2'].forEach(p => { document.getElementById(`next-${p}`).onclick = () => { if (userRole !== 'admin') return; saveUndo(); state[p].turnCount++; state.p1.active = (p === 'p1'); state.p2.active = (p === 'p2'); state[p].energy = 0; state[p].power = 0; state[p].runes = Math.min(12, state[p].runes + 2); addLog(`T${state[p].turnCount} [${state[p].name}]: Turn Start (+2 Runes)`); sync(); render(); }; });
            }
            ['p1', 'p2'].forEach(p => {
                document.getElementById(`name-text-${p}`).innerText = state[p].name;
                document.getElementById(`turn-count-${p}`).innerText = `Turn ${state[p].turnCount}`;
                document.getElementById(`board-${p}`).className = `player-board theme-${p} border-2 rounded-2xl p-4 flex flex-col transition-all shadow-lg ${state[p].active ? `active-turn-${p}` : ''}`;
                if (editingPlayer === p) { document.getElementById(`name-container-${p}`).classList.add('hidden'); document.getElementById(`name-edit-${p}`).classList.remove('hidden'); } 
                else { document.getElementById(`name-container-${p}`).classList.remove('hidden'); document.getElementById(`name-edit-${p}`).classList.add('hidden'); }
                stats.forEach(s => { document.getElementById(`val-${p}-${s.id}`).innerText = state[p][s.id]; });
            });
            document.getElementById('btn-flag').className = `w-11 h-11 rounded-xl flex items-center justify-center transition ${state.flag ? 'flag-active' : 'bg-slate-700'}`;
            if (state.logs[0]) document.getElementById('ui-last-log').innerText = state.logs[0];
            document.querySelectorAll('.admin-only').forEach(e => e.style.display = userRole === 'admin' ? '' : 'none');
        };

        window.startEditName = (p) => { if (userRole !== 'admin') return; editingPlayer = p; document.getElementById(`input-name-${p}`).value = state[p].name; render(); };
        window.saveName = (p) => { const n = document.getElementById(`input-name-${p}`).value.trim(); if (n) { saveUndo(); state[p].name = n; addLog(`Player renamed to ${n}`); sync(); } editingPlayer = null; render(); };
        
        window.updateStat = (p, s, d) => { 
            if (userRole !== 'admin') return; 
            if (document.getElementById('toggle-haptic').checked && navigator.vibrate) navigator.vibrate(25);
            saveUndo(); 
            const oldVal = state[p][s];
            state[p][s] = Math.max(0, state[p][s] + d); 
            if (oldVal !== state[p][s]) {
                const label = stats.find(x => x.id === s).label;
                addLog(`[${state[p].name}] ${label}: ${oldVal} -> ${state[p][s]}`);
            }
            sync(); render(); 
        };

        onAuthStateChanged(auth, async u => { if (!u) await signInAnonymously(auth); });

        document.getElementById('btn-create-room').onclick = async () => {
            judgeName = document.getElementById('setup-user-name').value || 'Judge';
            currentRoom = Math.random().toString(36).substring(2, 6).toUpperCase();
            userRole = 'admin';
            state.p1.name = document.getElementById('setup-p1-name').value;
            state.p2.name = document.getElementById('setup-p2-name').value;
            addLog(`Match Started - Judge: ${judgeName}`);
            await sync(); enterApp();
        };

        document.getElementById('btn-join-room').onclick = async () => {
            const code = document.getElementById('setup-room-code').value.toUpperCase();
            const snap = await getDoc(doc(db, 'matches', code));
            if (snap.exists()) { currentRoom = code; userRole = 'viewer'; state = snap.data(); enterApp(); } else alert("Room not found!");
        };

        function enterApp() {
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
            document.getElementById('ui-room-code').innerText = currentRoom;
            onSnapshot(doc(db, 'matches', currentRoom), (s) => { if (s.exists()) { state = s.data(); render(); } });
            render();
        }

        document.getElementById('btn-flag').onclick = () => { if (userRole !== 'admin') return; saveUndo(); state.flag = !state.flag; addLog(state.flag ? "🚨 JUDGE CALL" : "✅ SOLVED"); sync(); render(); };
        document.getElementById('btn-undo').onclick = () => { if (undoStack.length > 0) { state = JSON.parse(undoStack.pop()); sync(); render(); } };
        document.getElementById('btn-log').onclick = () => { document.getElementById('log-container').innerHTML = state.logs.map(l => `<div class="border-b border-slate-700/50 pb-1">${l}</div>`).join(''); document.getElementById('modal-log').classList.remove('hidden'); };
        document.getElementById('btn-settings').onclick = () => document.getElementById('modal-settings').classList.remove('hidden');
        document.querySelectorAll('.close-modal').forEach(b => b.onclick = (e) => e.target.closest('.modal-overlay').classList.add('hidden'));
        document.getElementById('btn-export').onclick = () => { navigator.clipboard.writeText(state.logs.join('\n')); alert("History copied!"); };
        document.getElementById('btn-reset-match').onclick = async () => { if (confirm("Reset match?")) { const n1 = state.p1.name, n2 = state.p2.name; state = JSON.parse(JSON.stringify(defaultState)); state.p1.name = n1; state.p2.name = n2; addLog("Match Reset"); await sync(); } };
    </script>
</body>
</html>
