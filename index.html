<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>RB Match Buddy</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0f172a; 
            color: #f8fafc; 
            -webkit-tap-highlight-color: transparent; 
            margin: 0;
            padding: 0;
        }
        
        .safe-padding {
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        .theme-p1 { background-color: rgba(13, 148, 136, 0.1); border-color: rgba(13, 148, 136, 0.3); }
        .theme-p2 { background-color: rgba(225, 29, 72, 0.1); border-color: rgba(225, 29, 72, 0.3); }
        
        .active-turn-p1 { border-color: rgba(20, 184, 166, 0.8); box-shadow: 0 0 20px rgba(20, 184, 166, 0.1) inset; }
        .active-turn-p2 { border-color: rgba(244, 63, 94, 0.8); box-shadow: 0 0 20px rgba(244, 63, 94, 0.1) inset; }

        @keyframes soft-glow {
            0% { background-color: rgba(255, 255, 255, 0); }
            50% { background-color: rgba(255, 255, 255, 0.06); }
            100% { background-color: rgba(255, 255, 255, 0); }
        }
        .flash-active-effect { animation: soft-glow 1.5s ease-in-out forwards; }

        .stat-card { 
            background-color: rgba(30, 41, 59, 0.8); 
            border-radius: 0.75rem; 
            padding: 0.5rem; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            border: 1px solid rgba(255,255,255,0.05); 
        }

        .btn-stat { 
            width: 2.8rem;
            height: 2.6rem; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background-color: #334155; 
            border-radius: 0.5rem; 
            font-size: 1.2rem; 
            font-weight: bold; 
            color: white; 
            transition: all 0.1s; 
            touch-action: manipulation; 
        }
        .btn-stat:active { background-color: #475569; transform: scale(0.92); }

        .flag-active { animation: pulse-red 2s infinite; background-color: #b91c1c !important; }
        @keyframes pulse-red { 
            0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.6); } 
            70% { box-shadow: 0 0 0 12px rgba(220, 38, 38, 0); } 
            100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); } 
        }

        .play-area { display: flex; flex-direction: column; gap: 0.75rem; padding: 0.75rem; padding-bottom: 3rem; }
        @media (min-width: 768px), (orientation: landscape) { .play-area { flex-direction: row; } .player-board { flex: 1; } }
        
        .modal-overlay { background-color: rgba(0,0,0,0.85); backdrop-filter: blur(4px); }
        .edit-input { background: #0f172a; border: 1px solid #14b8a6; border-radius: 4px; padding: 2px 8px; color: white; width: 120px; outline: none; }
        
        .footer-log {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2rem;
            background-color: #020617;
            border-top: 1px solid #1e293b;
            color: #64748b;
            font-size: 10px;
            display: flex;
            align-items: center;
            padding: 0 1rem;
            z-index: 45;
            pointer-events: none;
        }

        /* Fixed settings icon container to prevent clipping */
        .icon-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            overflow: hidden;
        }
    </style>
</head>
<body class="safe-padding">

    <!-- Setup Screen -->
    <div id="setup-screen" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl max-w-md w-full border border-slate-700">
            <h1 class="text-3xl font-bold text-center mb-8 text-teal-400">RB Match Buddy</h1>
            <div class="space-y-5">
                <input type="text" id="setup-user-name" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-white" placeholder="Judge Name">
                <div class="space-y-3">
                    <input type="text" id="setup-p1-name" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-white" value="Player 1">
                    <input type="text" id="setup-p2-name" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-white" value="Player 2">
                    <button id="btn-create-room" class="w-full bg-teal-600 text-white font-bold py-3 rounded-lg active:scale-95 transition">Create Room (Admin)</button>
                </div>
                <div class="relative py-2 text-center text-xs text-slate-500 uppercase">or</div>
                <div class="space-y-3">
                    <input type="text" id="setup-room-code" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-white uppercase text-center font-mono" placeholder="CODE">
                    <button id="btn-join-room" class="w-full bg-slate-700 text-white font-bold py-3 rounded-lg active:scale-95 transition">Join (Viewer)</button>
                </div>
            </div>
        </div>
    </div>

    <!-- App Screen -->
    <div id="app-screen" class="hidden min-h-screen flex flex-col relative">
        <header class="h-16 bg-slate-800/80 sticky top-0 z-40 border-b border-slate-700 flex justify-between items-center px-4 shrink-0 backdrop-blur-sm gap-2">
            <div class="flex flex-col min-w-0 flex-1 justify-center">
                <div class="flex items-center gap-2">
                    <span class="text-[10px] uppercase text-slate-400 font-bold tracking-wider">Room</span>
                    <span id="ui-room-code" class="text-xl font-mono font-black text-teal-300 tracking-widest bg-teal-900/40 px-3 py-0.5 rounded border border-teal-700/50 shadow-sm">----</span>
                </div>
                <span id="ui-judge-name" class="text-[9px] text-slate-500 font-medium truncate mt-0.5 uppercase tracking-wide">JUDGE: ---</span>
            </div>
            <div class="flex gap-2 shrink-0">
                <button id="btn-flag" class="bg-slate-700 w-11 h-11 rounded-xl flex items-center justify-center active:scale-90 transition">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 21v-4m0 0V5a2 2 0 012-2h6.5l1 1H21l-3 6 3 6h-8.5l-1-1H5a2 2 0 00-2 2zm9-13.5V9"/></svg>
                </button>
                <button id="btn-undo" class="bg-slate-700 w-11 h-11 rounded-xl flex items-center justify-center admin-only active:scale-90 transition">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"/></svg>
                </button>
                <button id="btn-log" class="bg-slate-700 w-11 h-11 rounded-xl flex items-center justify-center active:scale-90 transition">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                </button>
                <button id="btn-settings" class="bg-slate-700 w-11 h-11 rounded-xl flex items-center justify-center icon-btn active:scale-90 transition">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                </button>
            </div>
        </header>
        
        <main class="play-area flex-grow" id="play-area"></main>
        
        <footer class="footer-log" id="ui-last-log">
            Ready
        </footer>
    </div>

    <!-- Modals -->
    <div id="modal-log" class="modal-overlay fixed inset-0 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-slate-800 rounded-2xl w-full max-w-lg h-[80vh] flex flex-col border border-slate-700 shadow-2xl overflow-hidden">
            <div class="p-4 border-b border-slate-700 flex justify-between items-center"><h3 class="font-bold">Match History</h3><button class="close-modal p-2">✕</button></div>
            <div id="log-container" class="p-4 overflow-y-auto flex-1 font-mono text-xs space-y-2"></div>
            <div class="p-4 border-t border-slate-700"><button id="btn-export" class="w-full bg-slate-700 py-3 rounded-xl font-bold">Copy Report</button></div>
        </div>
    </div>

    <div id="modal-settings" class="modal-overlay fixed inset-0 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-slate-800 rounded-2xl w-full max-w-sm border border-slate-700 shadow-2xl overflow-hidden">
            <div class="p-4 border-b border-slate-700 flex justify-between items-center"><h3 class="font-bold">Settings</h3><button class="close-modal p-2">✕</button></div>
            <div class="p-6 space-y-6">
                <div class="flex items-center justify-between"><span class="text-sm">Haptic Feedback</span><input type="checkbox" id="toggle-haptic" class="w-6 h-6 accent-teal-500" checked></div>
                <div class="flex items-center justify-between"><span class="text-sm">Keep Screen Awake</span><input type="checkbox" id="toggle-wake" class="w-6 h-6 accent-teal-500"></div>
                <button id="btn-reset-match" class="w-full bg-red-900/50 border border-red-800 text-red-200 py-4 rounded-xl font-bold admin-only">Reset for New Game</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAoSrB369YkJRGvN5ppvfMrWPyc4A_TQp8",
            authDomain: "riftbound-match-notes.firebaseapp.com",
            projectId: "riftbound-match-notes",
            storageBucket: "riftbound-match-notes.firebasestorage.app",
            messagingSenderId: "572843702141",
            appId: "1:572843702141:web:7e82385fc04c6678aebe14"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let userRole = 'viewer'; let currentRoom = null; let undoStack = []; let wakeLock = null; let editingPlayer = null;
        
        const defaultState = { 
            judgeName: "Judge",
            p1: { name: "Player 1", points: 0, xp: 0, hand: 4, runes: 0, energy: 0, power: 0, active: false, turnCount: 0 }, 
            p2: { name: "Player 2", points: 0, xp: 0, hand: 4, runes: 0, energy: 0, power: 0, active: false, turnCount: 0 }, 
            flag: false, logs: [] 
        };
        let state = JSON.parse(JSON.stringify(defaultState));
        const stats = [
            { id: 'points', label: 'Points' }, 
            { id: 'xp', label: 'XP' }, 
            { id: 'runes', label: '🌀 Runes' }, 
            { id: 'hand', label: '🖐🏻 Hand' }, 
            { id: 'energy', label: 'Energy' }, 
            { id: 'power', label: 'Power' }
        ];

        const triggerVibrate = () => {
            if (document.getElementById('toggle-haptic').checked && typeof navigator.vibrate === 'function') {
                navigator.vibrate(20);
            }
        };

        const sync = async () => { if (userRole !== 'admin' || !currentRoom) return; await setDoc(doc(db, 'matches', currentRoom), state); };
        const addLog = (msg) => { const t = new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' }); state.logs.unshift(`${t} - ${msg}`); if (state.logs.length > 60) state.logs.pop(); };
        const saveUndo = () => { undoStack.push(JSON.stringify(state)); if (undoStack.length > 20) undoStack.shift(); };

        const triggerFlash = (p) => {
            const el = document.getElementById(`flash-overlay-${p}`);
            if (!el) return;
            el.classList.remove('flash-active-effect');
            void el.offsetWidth;
            el.classList.add('flash-active-effect');
        };

        const render = () => {
            const container = document.getElementById('play-area');
            if (container.children.length === 0) {
                container.innerHTML = ['p1', 'p2'].map(p => `
                    <div id="board-${p}" class="player-board theme-${p} border-2 rounded-2xl p-4 flex flex-col transition-all shadow-lg relative overflow-hidden">
                        <div id="flash-overlay-${p}" class="absolute inset-0 pointer-events-none z-0"></div>
                        <div class="flex justify-between items-start mb-4 relative z-10">
                            <div>
                                <div id="name-container-${p}" class="flex items-center gap-2">
                                    <h2 class="font-bold text-lg" id="name-text-${p}"></h2>
                                    <button onclick="startEditName('${p}')" class="admin-only opacity-40 p-1">✎</button>
                                </div>
                                <div id="name-edit-${p}" class="hidden flex items-center gap-1">
                                    <input type="text" id="input-name-${p}" class="edit-input text-sm">
                                    <button onclick="saveName('${p}')" class="text-teal-400 font-bold">✓</button>
                                </div>
                                <span class="text-[10px] text-slate-500 font-black uppercase" id="turn-count-${p}"></span>
                            </div>
                            <button id="next-${p}" class="admin-only bg-slate-800 px-3 py-1.5 rounded-lg text-[10px] font-black border border-slate-600 active:scale-95 transition uppercase">Next Turn</button>
                        </div>
                        <div class="grid grid-cols-2 gap-3 flex-1 relative z-10">
                            ${stats.map(s => `
                                <div class="stat-card">
                                    <span class="text-[10px] uppercase font-bold mb-2 text-slate-400">${s.label}</span>
                                    <div class="flex items-center justify-between w-full px-1">
                                        <button class="btn-stat admin-only" data-p="${p}" data-s="${s.id}" data-d="-1">-</button>
                                        <span class="text-2xl font-black font-mono text-center flex-1" id="val-${p}-${s.id}">0</span>
                                        <button class="btn-stat admin-only" data-p="${p}" data-s="${s.id}" data-d="1">+</button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>`).join('');
                
                container.addEventListener('click', (e) => {
                    const btn = e.target.closest('.btn-stat');
                    if (btn && userRole === 'admin') {
                        triggerVibrate();
                        const p = btn.dataset.p; const s = btn.dataset.s; const d = parseInt(btn.dataset.d);
                        window.doUpdateStat(p, s, d);
                    }
                });

                ['p1', 'p2'].forEach(p => { 
                    document.getElementById(`next-${p}`).onclick = () => { 
                        if (userRole !== 'admin') return; 
                        triggerVibrate(); saveUndo(); 
                        
                        state[p].turnCount++; 
                        state.p1.active = (p === 'p1'); 
                        state.p2.active = (p === 'p2');
                        
                        // Local resource logic (Runes only for active player)
                        state[p].runes = Math.min(12, state[p].runes + 2);

                        // SHARED RESET: Energy and Power reset for BOTH players
                        state.p1.energy = 0;
                        state.p1.power = 0;
                        state.p2.energy = 0;
                        state.p2.power = 0;

                        addLog(`T${state[p].turnCount} [${state[p].name}]: Turn Started (Energy/Power reset for all)`); 
                        triggerFlash(p); 
                        sync(); 
                        render(); 
                    }; 
                });
            }
            
            document.getElementById('ui-judge-name').innerText = `JUDGE: ${state.judgeName || 'Unknown'}`;

            ['p1', 'p2'].forEach(p => {
                document.getElementById(`name-text-${p}`).innerText = state[p].name;
                document.getElementById(`turn-count-${p}`).innerText = `Turn ${state[p].turnCount}`;
                document.getElementById(`board-${p}`).className = `player-board theme-${p} border-2 rounded-2xl p-4 flex flex-col transition-all shadow-lg relative overflow-hidden ${state[p].active ? `active-turn-${p}` : ''}`;
                
                if (editingPlayer === p) {
                    document.getElementById(`name-container-${p}`).classList.add('hidden');
                    document.getElementById(`name-edit-${p}`).classList.remove('hidden');
                } else {
                    document.getElementById(`name-container-${p}`).classList.remove('hidden');
                    document.getElementById(`name-edit-${p}`).classList.add('hidden');
                }
                
                stats.forEach(s => { document.getElementById(`val-${p}-${s.id}`).innerText = state[p][s.id]; });
            });
            document.getElementById('btn-flag').className = `w-11 h-11 rounded-xl flex items-center justify-center active:scale-90 transition ${state.flag ? 'flag-active' : 'bg-slate-700'}`;
            if (state.logs[0]) document.getElementById('ui-last-log').innerText = state.logs[0];
            document.querySelectorAll('.admin-only').forEach(e => e.style.display = userRole === 'admin' ? '' : 'none');
        };

        window.startEditName = (p) => { if (userRole !== 'admin') return; triggerVibrate(); editingPlayer = p; document.getElementById(`input-name-${p}`).value = state[p].name; render(); };
        window.saveName = (p) => { 
            triggerVibrate();
            const n = document.getElementById(`input-name-${p}`).value.trim(); 
            if (n) { saveUndo(); const old = state[p].name; state[p].name = n; addLog(`Renamed: ${old} -> ${n}`); sync(); } 
            editingPlayer = null; render(); 
        };

        window.doUpdateStat = (p, s, d) => {
            saveUndo(); const oldVal = state[p][s]; state[p][s] = Math.max(0, state[p][s] + d); 
            if (oldVal !== state[p][s]) { addLog(`[${state[p].name}] ${stats.find(x=>x.id===s).label}: ${oldVal} -> ${state[p][s]}`); }
            sync(); render();
        };

        onAuthStateChanged(auth, async u => { if (!u) await signInAnonymously(auth); });

        document.getElementById('btn-create-room').onclick = async () => {
            triggerVibrate();
            currentRoom = Math.random().toString(36).substring(2, 6).toUpperCase(); userRole = 'admin';
            state.judgeName = document.getElementById('setup-user-name').value.trim() || "Judge";
            state.p1.name = document.getElementById('setup-p1-name').value || "Player 1"; 
            state.p2.name = document.getElementById('setup-p2-name').value || "Player 2";
            addLog(`Match Started - Room: ${currentRoom}`); enterApp(); await sync();
        };

        document.getElementById('btn-join-room').onclick = async () => {
            triggerVibrate();
            const code = document.getElementById('setup-room-code').value.toUpperCase();
            if (!code) return;
            const snap = await getDoc(doc(db, 'matches', code));
            if (snap.exists()) { currentRoom = code; userRole = 'viewer'; state = snap.data(); enterApp(); } else alert("Room not found!");
        };

        function enterApp() {
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
            document.getElementById('ui-room-code').innerText = currentRoom;
            onSnapshot(doc(db, 'matches', currentRoom), (s) => { 
                if (s.exists()) { 
                    const data = s.data();
                    if (data.p1.turnCount !== state.p1.turnCount) triggerFlash('p1');
                    if (data.p2.turnCount !== state.p2.turnCount) triggerFlash('p2');
                    state = data; render(); 
                } 
            });
            render();
        }

        document.getElementById('btn-flag').onclick = () => { triggerVibrate(); if (userRole !== 'admin') return; saveUndo(); state.flag = !state.flag; addLog(state.flag ? "🚨 JUDGE CALL" : "✅ RESOLVED"); sync(); render(); };
        document.getElementById('btn-undo').onclick = () => { triggerVibrate(); if (undoStack.length > 0) { state = JSON.parse(undoStack.pop()); sync(); render(); } };
        document.getElementById('btn-log').onclick = () => { triggerVibrate(); document.getElementById('log-container').innerHTML = state.logs.map(l => `<div class="border-b border-slate-700/50 pb-1">${l}</div>`).join(''); document.getElementById('modal-log').classList.remove('hidden'); };
        document.getElementById('btn-settings').onclick = () => { triggerVibrate(); document.getElementById('modal-settings').classList.remove('hidden'); };
        document.querySelectorAll('.close-modal').forEach(b => b.onclick = (e) => { triggerVibrate(); e.target.closest('.modal-overlay').classList.add('hidden'); });
        document.getElementById('btn-export').onclick = () => { triggerVibrate(); navigator.clipboard.writeText(state.logs.join('\n')); alert("Logs copied to clipboard!"); };
        
        document.getElementById('btn-reset-match').onclick = async () => { 
            triggerVibrate(); 
            if (confirm("Are you sure you want to reset the match?")) { 
                if (confirm("Do you want to download the log file before clearing?")) {
                    const blob = new Blob([state.logs.join('\n')], { type: 'text/plain' });
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = `MatchLog_${currentRoom}.txt`;
                    a.click();
                    URL.revokeObjectURL(a.href);
                }
                const n1 = state.p1.name, n2 = state.p2.name, jName = state.judgeName; 
                state = JSON.parse(JSON.stringify(defaultState)); 
                state.p1.name = n1; state.p2.name = n2; state.judgeName = jName;
                addLog("Match Reset"); await sync(); 
                document.getElementById('modal-settings').classList.add('hidden');
            } 
        };
    </script>
</body>
</html>
